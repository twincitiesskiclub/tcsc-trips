# Existing production resources exported from Render on 2026-07-11 and
# reconciled into one Blueprint. Resource names must remain exact so Render
# adopts the live services instead of creating suffixed duplicates.
version: "1"
projects:
  - name: Twin Cities Ski Club
    environments:
      - name: Production
        services:
          - type: web
            name: tcsc-registration
            runtime: python
            repo: https://github.com/twincitiesskiclub/tcsc-trips
            plan: starter
            envVars:
              # Existing values remain in Render. Secrets never enter git.
              - key: SLACK_YOUR_X_ID
                sync: false
              - key: SLACK_SIGNING_SECRET
                sync: false
              - key: STRIPE_DEV_WEBHOOK_SECRET
                sync: false
              - key: GOOGLE_CLIENT_SECRET
                sync: false
              - key: DATABASE_URL
                sync: false
              - key: FLASK_ENV
                sync: false
              - key: SLACK_APP_TOKEN
                sync: false
              - key: STRIPE_DEV_SECRET_KEY
                sync: false
              - key: SLACK_YOUR_COOKIE
                sync: false
              - key: GOOGLE_PLACES_API_KEY
                sync: false
              - key: SLACK_ADMIN_TOKEN
                sync: false
              - key: STRIPE_DEV_PUBLISHABLE_KEY
                sync: false
              - key: STRIPE_SECRET_KEY
                sync: false
              - key: GOOGLE_CLIENT_ID
                sync: false
              - key: SLACK_BOT_TOKEN
                sync: false
              - key: SLACK_USER_TOKEN
                sync: false
              - key: SLACK_WEBHOOK_URL
                sync: false
              - key: STRIPE_PUBLISHABLE_KEY
                sync: false
              - key: FLASK_SECRET_KEY
                sync: false
              - key: STRIPE_WEBHOOK_SECRET
                sync: false
              - key: EXPERTVOICE_SFTP_PASSWORD
                sync: false
              - key: EXPERTVOICE_SFTP_USERNAME
                sync: false
              - key: FLASK_DEBUG
                sync: false
              - key: ANTHROPIC_API_KEY
                sync: false
            region: oregon
            buildCommand: pip install -r requirements.txt
            startCommand: gunicorn "app:create_app()"
            preDeployCommand: ./scripts/release.sh
            domains:
              - www.tcsc.ski
              - tcsc.ski
            autoDeployTrigger: commit

          - type: web
            name: tcsc-team-site
            runtime: static
            repo: https://github.com/twincitiesskiclub/tcsc-trips
            envVars:
              - key: PUBLIC_CONDITIONS_API_URL
                value: https://tcsc.ski/api/conditions
              # Astro 7 requires Node >=22.12. Keep the production builder on
              # the same Node release used for clean-install verification.
              - key: NODE_VERSION
                value: 22.22.0
              # This flag is enabled only alongside the edge routes below. It
              # switches Astro from compatibility resources to flat pages so
              # Render can issue true redirects before serving content.
              - key: TCSC_EDGE_CONFIG
                value: "true"
            buildCommand: cd site && npm ci && npm run build
            staticPublishPath: site/dist
            domains:
              - twincitiesskiclub.org
              - www.twincitiesskiclub.org
            headers:
              # Browser security baseline for every static response. The CSP
              # permits Astro's inline modules/styles and the conditions API.
              - path: /*
                name: Content-Security-Policy
                value: "default-src 'self'; base-uri 'self'; connect-src 'self' https://tcsc.ski; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; upgrade-insecure-requests"
              - path: /*
                name: Permissions-Policy
                value: "camera=(), geolocation=(), microphone=(), payment=(), usb=()"
              - path: /*
                name: Referrer-Policy
                value: strict-origin-when-cross-origin
              - path: /*
                name: Strict-Transport-Security
                value: "max-age=31536000"
              - path: /*
                name: X-Content-Type-Options
                value: nosniff
              - path: /*
                name: X-Frame-Options
                value: DENY

              # Astro fingerprints everything under /_astro/. A content
              # change produces a new URL, so these files are immutable.
              - path: /_astro/*
                name: Cache-Control
                value: "public, max-age=31536000, immutable"

              # Revalidate HTML and redirect resources on every visit.
              - path: /
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /*.html
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /**/*.html
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /about*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /coaches*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /community*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /dry-tri*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /extra-training-fun*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /racing*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /sponsors*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /trips*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /wax-room*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /register*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /copy-of-register*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /sisu-signup*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"
              - path: /trip-sign-up*
                name: Cache-Control
                value: "public, max-age=0, must-revalidate"

            routes:
              # Retired Wix/signup routes. Both URL forms resolve directly to
              # their working destination with a Render 301.
              - type: redirect
                source: /register
                destination: https://tcsc.ski/
              - type: redirect
                source: /register/
                destination: https://tcsc.ski/
              - type: redirect
                source: /copy-of-register
                destination: https://tcsc.ski/
              - type: redirect
                source: /copy-of-register/
                destination: https://tcsc.ski/
              - type: redirect
                source: /sisu-signup
                destination: /trips
              - type: redirect
                source: /sisu-signup/
                destination: /trips
              - type: redirect
                source: /trip-sign-up
                destination: /trips
              - type: redirect
                source: /trip-sign-up/
                destination: /trips
              - type: redirect
                source: /sisu-information
                destination: /trips
              - type: redirect
                source: /sisu-information/
                destination: /trips
              - type: redirect
                source: /trips/sisu-ski-fest
                destination: /trips
              - type: redirect
                source: /trips/sisu-ski-fest/
                destination: /trips
              - type: redirect
                source: /trip-information
                destination: /trips
              - type: redirect
                source: /trip-information/
                destination: /trips
              - type: redirect
                source: /trip-confirmation
                destination: /
              - type: redirect
                source: /trip-confirmation/
                destination: /
              - type: redirect
                source: /confirmation
                destination: /
              - type: redirect
                source: /confirmation/
                destination: /
              - type: redirect
                source: /contact
                destination: /
              - type: redirect
                source: /contact/
                destination: /

              # Render matches these slash-form sources against the clean URL
              # after resource lookup. Rewriting to the generated flat file
              # keeps clean URLs at 200 without the self-redirect loops that
              # a redirect to the same extensionless path would create.
              - type: rewrite
                source: /about/
                destination: /about.html
              - type: rewrite
                source: /coaches/
                destination: /coaches.html
              - type: rewrite
                source: /community/
                destination: /community.html
              - type: rewrite
                source: /dry-tri/
                destination: /dry-tri.html
              - type: rewrite
                source: /extra-training-fun/
                destination: /extra-training-fun.html
              - type: rewrite
                source: /racing/
                destination: /racing.html
              - type: rewrite
                source: /sponsors/
                destination: /sponsors.html
              - type: rewrite
                source: /trips/
                destination: /trips.html
              - type: rewrite
                source: /wax-room/
                destination: /wax-room.html
              - type: rewrite
                source: /wax-room/:slug/
                destination: /wax-room/:slug.html

            autoDeployTrigger: commit
